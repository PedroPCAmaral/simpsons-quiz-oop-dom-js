<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Quiz Simpsons</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="inicio" class="card">
    <h1>QUAL SIMPSON VOCÊ É?</h1>
    <p>Responda as perguntas e descubra!</p>
    <button onclick="iniciarQuiz()">COMEÇAR</button>
</div>

<div id="quiz" class="card" style="display:none;">
    <h2 id="pergunta"></h2>
    <div id="opcoes"></div>
</div>

<div id="resultado" class="card" style="display:none;">
    <h2 id="nome"></h2>
    <img id="img">
    <p id="desc"></p>
    <p id="pontuacao"></p>
    <button onclick="reiniciar()">JOGAR NOVAMENTE</button>
</div>

<script src="data.js"></script>
<script src="script.js"></script>

</body>
</html>
